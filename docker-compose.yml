services:
  nexus:
    build: .
    container_name: nexus-inspiration
    restart: unless-stopped
    network_mode: host
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_NAME=mydb
      - DB_USER=postgreadmin
      - DB_PASSWORD=PostGre@123
    volumes:
      - nexus-uploads:/app/uploads

  nginx:
    build: ./nginx
    container_name: nexus-nginx
    restart: unless-stopped
    network_mode: host
    depends_on:
      - nexus
    volumes:
      - nginx-certs:/etc/nginx/ssl

volumes:
  nexus-uploads:
  nginx-certs:
